name: Transifex Sync

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-translations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext

      - name: Extract strings
        run: |
          find makebread -name '*.py' | xargs xgettext --from-code=UTF-8 \
            --language=Python --keyword=_ --keyword=N_ \
            --sort-output --output=po/makebread.pot

      - name: Install Transifex CLI
        run: |
          curl -o- https://raw.githubusercontent.com/transifex/cli/master/install.sh | bash
          sudo mv tx /usr/local/bin/

      - name: Push source strings to Transifex
        env:
          TX_TOKEN: ${{ secrets.TX_TOKEN }}
        run: tx push --source

      - name: Pull translations from Transifex
        env:
          TX_TOKEN: ${{ secrets.TX_TOKEN }}
        run: tx pull --all --minimum-perc=10

      - name: Compile translations
        run: |
          for po in po/*.po; do
            if [ -f "$po" ]; then
              lang=$(basename "$po" .po)
              mkdir -p "makebread/resources/locale/$lang/LC_MESSAGES"
              msgfmt "$po" -o "makebread/resources/locale/$lang/LC_MESSAGES/makebread.mo"
            fi
          done

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add po/ makebread/resources/locale/
          if ! git diff --cached --quiet; then
            git commit -m "Update translations from Transifex"
            git push
          fi
